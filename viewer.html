<!DOCTYPE html>
<html><head><title>Frame Viewer</title>
<style>body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center}
img{max-width:100%;cursor:zoom-in}
img.zoomed{max-width:none;cursor:zoom-out}</style>
</head><body>
<img id="img" src="frame1.png" onclick="this.classList.toggle('zoomed')">
<div style="position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px">
<button onclick="document.getElementById('img').src='frame1.png'" style="padding:8px 16px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer">Frame 1</button>
<button onclick="document.getElementById('img').src='frame2.png'" style="padding:8px 16px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer">Frame 2</button>
<button onclick="document.getElementById('img').src='frame3.png'" style="padding:8px 16px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer">Frame 3</button>
</div>
</body></html>
